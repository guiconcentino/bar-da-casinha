<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bar da Casinha</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Bar da Casinha</h1>

<input id="pesquisa" placeholder="Pesquisar ingrediente" onkeyup="filtrar()">

<div id="lista"></div>

<script>

let drinks=[]

fetch("drinks.json")
.then(res=>res.json())
.then(data=>{
drinks=data
carregar()
})

function carregar(){

let lista=document.getElementById("lista")

lista.innerHTML=""

drinks.forEach((drink,i)=>{

let ingredientesHTML=""

drink.ingredientes.forEach(ing=>{
ingredientesHTML+="<li>"+ing+"</li>"
})

lista.innerHTML+=`

<div class="drink">

<h2>${drink.nome}</h2>

<button onclick="toggle(${i})">Ver receita</button>

<div class="receita" id="r${i}">

<p><b>Ingredientes</b></p>
<ul>${ingredientesHTML}</ul>

<p><b>Modo de preparo</b><br>${drink.modo}</p>

<p><b>Copo ou taça</b><br>${drink.copo}</p>

<p><b>Guarnição</b><br>${drink.guarnicao}</p>

</div>

</div>

`

})

}

function toggle(i){

let r=document.getElementById("r"+i)

if(r.style.display=="block")
r.style.display="none"
else
r.style.display="block"

}

function filtrar(){

let termo=document.getElementById("pesquisa").value.toLowerCase()

let cards=document.getElementsByClassName("drink")

for(let i=0;i<cards.length;i++){

let texto=cards[i].innerText.toLowerCase()

cards[i].style.display=
texto.includes(termo)?"block":"none"

}

}

</script>

</body>

</html>
